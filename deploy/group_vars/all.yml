---
# Configuration for the steve eve-agent deployment (PoC — no vault).
#
# Secrets are kept dead simple for a PoC:
#   - The DigitalOcean API token comes from the DO_API_TOKEN env var at
#     provision time (export it, or pass -e do_api_token=...).
#   - The app's runtime secrets live in your local ../.env, which deploy.yml
#     rsyncs verbatim to /opt/steve/.env on the droplet.

# DigitalOcean API token. Defaults to the DO_API_TOKEN environment variable.
do_api_token: "{{ lookup('env', 'DO_API_TOKEN') }}"

# Local .env file rsynced to the droplet as the app's runtime environment.
local_env_file: "{{ playbook_dir }}/../.env"

# --- DigitalOcean droplet (provision.yml) ---------------------------------
# Minimal-but-realistic PoC sizing. 1GB droplets OOM during `pnpm install` +
# build with Node 24 while Postgres and sandbox containers also run, so the
# smallest reliable size is the 2GB shared-CPU plan.
do_droplet_name: "steve-poc"
do_region: "nyc3"
do_size: "s-2vcpu-2gb"
do_image: "ubuntu-24-04-x64"
# Name under which your local public key is uploaded to DigitalOcean so the
# first root login works (key-only). Must be unique within your DO account.
do_ssh_key_name: "steve-deploy-{{ lookup('env', 'USER') | default('local', true) }}"
# Local public key used for the initial root login and the deploy user.
local_ssh_pubkey_path: "~/.ssh/id_ed25519.pub"

# --- App ------------------------------------------------------------------
app_user: "deploy"
app_dir: "/opt/steve"
app_repo: "git@github.com:vercel-labs/steve.git"
# Branch, tag, or commit SHA to deploy. Override per-run with:
#   ansible-playbook deploy.yml -e git_ref=<ref>
git_ref: "origin/main"

node_major: "24"
pnpm_version: "10.33.2"

app_port: 3000
# Postgres is published on this host port by docker-compose.yml (5544:5432).
postgres_host_port: 5544

# --- Reverse proxy / TLS (caddy) ------------------------------------------
# Leave empty until DNS is pointed at the droplet. While empty, Caddy serves
# the app over plain HTTP on :80 (good for smoke-testing by IP). Once you set
# a real domain (with an A record -> droplet IP) and re-run deploy.yml, Caddy
# provisions a Let's Encrypt certificate automatically.
domain: ""
# Email used for the Let's Encrypt ACME account (recommended once domain set).
acme_email: ""
