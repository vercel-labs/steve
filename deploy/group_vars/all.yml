---
# Configuration for the single-host Steve reference deployment.
#
# Secrets are not committed:
#   - The DigitalOcean API token comes from the DO_API_TOKEN env var at
#     provision time (export it, or pass -e do_api_token=...).
#   - The app's runtime secrets live in your local ../.env, which deploy.yml
#     rsyncs verbatim to /opt/steve/.env on the droplet.

# DigitalOcean API token. Defaults to the DO_API_TOKEN environment variable.
do_api_token: "{{ lookup('env', 'DO_API_TOKEN') }}"

# Local .env file rsynced to the droplet as the app's runtime environment.
local_env_file: "{{ playbook_dir }}/../.env"

# --- DigitalOcean droplet (provision.yml) ---------------------------------
# Sizing: the agent + Postgres + Docker sandbox + a Next.js production build
# (`next build` needs ~1.5GB) coexist on this box. 2GB OOMs/struggles during
# the Next build; 4GB is comfortable. The frontend role also adds a swapfile as
# a safety margin. Bump higher (s-4vcpu-8gb) if you add more services.
do_droplet_name: "steve-poc"
do_region: "nyc3"
do_size: "s-2vcpu-4gb"
do_image: "ubuntu-24-04-x64"
# Name under which your local public key is uploaded to DigitalOcean so the
# first root login works (key-only). Must be unique within your DO account.
do_ssh_key_name: "steve-deploykey-{{ lookup('env', 'USER') | default('local', true) }}"
# Local public key used for the initial root login and the deploy user.
# Uses a dedicated, passphrase-less deploy key so Ansible can authenticate
# non-interactively (the default ~/.ssh/id_ed25519 is passphrase-protected).
# Generate with: ssh-keygen -t ed25519 -N "" -f ~/.ssh/steve_deploy
local_ssh_pubkey_path: "~/.ssh/steve_deploy.pub"

# --- App ------------------------------------------------------------------
app_user: "deploy"
app_dir: "/opt/steve"
eve_state_dir: "/home/{{ app_user }}/.local/state/steve"
workflow_backup_dir: "/opt/steve-backups"
app_repo: "git@github.com:vercel-labs/steve.git"
# Branch, tag, or commit SHA to deploy. Override per-run with:
#   ansible-playbook deploy.yml -e git_ref=<ref>
git_ref: "origin/main"

node_major: "24"
pnpm_version: "10.33.2"
# Eve releases before 0.20 can leave active Workflow logs that do not replay
# against the current runtime. The app role blocks this one-time cutover until
# those runs are explicitly cancelled on the old deployment.
eve_replay_cutover_version: "0.20.0"
workflow_backup_retention: 10

# Environment applied to every pnpm invocation. Build-script permissions live
# in pnpm-workspace.yaml instead of a process-wide allow-all switch.
pnpm_env:
  HOME: "/home/{{ app_user }}"
  CI: "true"

# The eve agent host (eve start), bound to localhost.
app_port: 3000
workflow_worker_concurrency: 10
workflow_postgres_max_pool_size: 12
# Postgres is published on loopback only by docker-compose.yml.
postgres_host_port: 5544

# --- Frontend (Next.js UI) ------------------------------------------------
# The Next app runs on localhost. Caddy path-routes Eve protocol traffic to the
# agent and sends every other request to this service.
web_port: 3001
# `next build` OOMs on the 2GB droplet without swap; the frontend role adds this.
swapfile_path: "/swapfile"

# --- Monitoring (Beszel) --------------------------------------------------
# Beszel hub (dashboard) + agent run on this droplet via Docker. The hub is
# exposed at monitoring_domain with TLS; it has its own login.
monitoring_enabled: false
monitoring_manage: true
monitoring_dir: "/opt/beszel"
beszel_hub_port: 8090
# Port the Beszel agent listens on for the hub (loopback only).
beszel_agent_port: 45876
# Agent credentials from the hub's "Add System" flow (Beszel UI -> Add System).
# The hub shows a public KEY; the WebSocket-based agent also gets a TOKEN.
# The KEY is a public key (safe to commit). The TOKEN is a shared secret, so it
# now comes from the BESZEL_AGENT_TOKEN environment variable at deploy time
# (export it before `ansible-playbook deploy.yml`, exactly like DO_API_TOKEN).
# Leave these empty until Beszel's Add System flow provides them.
beszel_agent_key: ""
beszel_agent_token: "{{ lookup('env', 'BESZEL_AGENT_TOKEN') | default('', true) }}"
# Hub URL the agent connects back to. Set it when monitoring is enabled.
beszel_hub_url: ""

# --- Tracing (Jaeger) -----------------------------------------------------
# Jaeger runs on this droplet via Docker and receives eve's OpenTelemetry trace
# spans over OTLP/HTTP. The agent exports to it when the deployed .env sets
# OTEL_EXPORTER_OTLP_ENDPOINT="http://localhost:4318". Prompt and output
# recording remain disabled unless explicitly enabled. The UI is exposed only
# when jaeger_domain and Basic auth are configured.
jaeger_enabled: true
jaeger_manage: true
jaeger_dir: "/opt/jaeger"
# Jaeger all-in-one UI (bound to localhost; Caddy terminates TLS + adds auth).
jaeger_ui_port: 16686
# OTLP/HTTP receiver the agent ships spans to (bound to localhost).
jaeger_otlp_port: 4318
# Public subdomain for the Jaeger UI (needs its own A record -> droplet IP).
# Leave empty to keep Jaeger internal (reach it via SSH tunnel instead).
jaeger_domain: ""
# HTTP Basic credentials for the public Jaeger UI, sourced from the environment
# at deploy time so they aren't baked into this file:
#   JAEGER_BASIC_AUTH_USER  username (defaults to `eve` if unset)
#   JAEGER_BASIC_AUTH_HASH  bcrypt hash of the password (Caddy `basic_auth` format)
# Export them before `ansible-playbook deploy.yml` (like DO_API_TOKEN). Generate
# a hash with:  caddy hash-password --plaintext '<password>'
# If the hash is unset, Caddy returns 503 instead of exposing trace data.
jaeger_basic_auth_user: "{{ lookup('env', 'JAEGER_BASIC_AUTH_USER') | default('eve', true) }}"
jaeger_basic_auth_hash: "{{ lookup('env', 'JAEGER_BASIC_AUTH_HASH') | default('', true) }}"

# --- Reverse proxy / TLS (caddy) ------------------------------------------
# Leave empty until DNS is pointed at the droplet. While empty, Caddy serves
# the app over plain HTTP on :80 (good for smoke-testing by IP). Once you set
# a real domain (with an A record -> droplet IP) and re-run deploy.yml, Caddy
# provisions a Let's Encrypt certificate automatically.
domain: ""
# Existing deployments must set this true explicitly if they intentionally
# remove a configured domain and return to plain-HTTP IP mode.
allow_plain_http_existing_deployment: false
# Monitoring dashboard subdomain (needs its own A record -> droplet IP).
# Leave empty to skip exposing Beszel publicly (access via SSH tunnel instead).
monitoring_domain: ""
# Email used for the Let's Encrypt ACME account (recommended once domain set).
acme_email: ""
caddy_manage: true
