---
# Phase 2 — deploy (and redeploy) the app. Connects as the unprivileged
# deploy user created during bootstrap; escalates with sudo where needed.
#
# First deploy:
#   ansible-playbook deploy.yml
#   (pauses once to let you add the printed deploy key to GitHub)
#
# Redeploy new code:
#   ansible-playbook deploy.yml [-e git_ref=<branch|sha>]
#
# Roles, in order:
#   docker     - Docker Engine + compose
#   app        - clone, install, .env, Postgres, migrate, eve agent (systemd)
#   frontend   - build Next.js UI, run `next start` (systemd), the public site
#   monitoring - Beszel hub + agent (Docker)
#   jaeger     - Jaeger all-in-one trace UI + OTLP receiver (Docker)
#   caddy      - TLS reverse proxy: domain -> UI, status -> Beszel, jaeger -> Jaeger
- name: Deploy the steve eve-agent host
  hosts: steve
  remote_user: "{{ app_user }}"
  become: false
  gather_facts: true
  roles:
    - role: docker
      become: true
    - role: app
    - role: frontend
    - role: monitoring
      when: monitoring_enabled | default(false)
    - role: jaeger
      when: jaeger_enabled | default(false)
    - role: caddy
      become: true

  post_tasks:
    - name: Wait for the eve agent to answer on localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/eve/v1/health"
        status_code: [200, 401]
      register: health
      retries: 20
      delay: 3
      until: health.status in [200, 401]

    - name: Wait for the web UI to answer on localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ web_port }}/"
        status_code: [200]
      register: web_up
      retries: 20
      delay: 3
      until: web_up.status == 200

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Agent: systemd 'steve' on 127.0.0.1:{{ app_port }} (eve dev --no-ui)."
          - "Web UI: systemd 'steve-web' on 127.0.0.1:{{ web_port }} (next start)."
          - >-
            {{ 'Public site: https://' + domain + '/'
               if (domain | default('') | length > 0)
               else 'Public site (pre-domain): http://' + inventory_hostname + '/' }}
          - >-
            {{ ('Monitoring: https://' + monitoring_domain + '/  (Beszel; create admin on first visit)')
               if (monitoring_enabled | default(false) and (monitoring_domain | default('') | length > 0))
               else 'Monitoring: disabled or not exposed' }}
          - >-
            {{ ('Traces: https://' + jaeger_domain + '/  (Jaeger; Basic auth user ' + jaeger_basic_auth_user + ')')
               if (jaeger_enabled | default(false) and (jaeger_domain | default('') | length > 0))
               else 'Traces: Jaeger disabled or not exposed' }}
          - "Header check: curl -I returns 'x-hosted-on-vercel: false'."
