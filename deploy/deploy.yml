---
# Phase 2 — deploy (and redeploy) the app. Connects as the unprivileged
# deploy user created during bootstrap; escalates with sudo where needed.
#
# First deploy:
#   ansible-playbook deploy.yml
#   (pauses once to let you add the printed deploy key to GitHub)
#
# Redeploy new code:
#   ansible-playbook deploy.yml [-e git_ref=<branch|sha>]
#
# Roles, in order:
#   docker     - Docker Engine + compose
#   app        - clone, install, .env, Postgres, migrate, eve agent (systemd)
#   frontend   - build Next.js UI, run `next start` (systemd), the public site
#   monitoring - Beszel hub + agent (Docker)
#   jaeger     - Jaeger all-in-one trace UI + OTLP receiver (Docker)
#   caddy      - TLS reverse proxy: domain -> UI, status -> Beszel, jaeger -> Jaeger
- name: Deploy the steve eve-agent host
  hosts: steve
  remote_user: "{{ app_user }}"
  become: false
  gather_facts: true
  roles:
    - role: docker
      become: true
    - role: app
    - role: frontend
    - role: monitoring
      when: monitoring_manage | default(true) | bool
    - role: jaeger
      when:
        - jaeger_enabled | default(false) | bool
        - jaeger_manage | default(true) | bool
    - role: caddy
      become: true
      when: caddy_manage | default(true) | bool

  post_tasks:
    - name: Wait for the eve agent to answer on localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/eve/v1/health"
        status_code: [200]
      register: health
      retries: 20
      delay: 3
      until: health.status == 200

    - name: Verify production-shaped requests fail closed without credentials
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/eve/v1/info"
        headers:
          Host: "{{ domain if (domain | default('') | length > 0) else inventory_hostname }}"
          X-Forwarded-Proto: https
        status_code: [401]

    - name: Verify a spoofed loopback Host cannot enable local development auth
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/eve/v1/info"
        headers:
          Host: localhost
          X-Forwarded-Proto: https
        status_code: [401]

    - name: Verify configured Basic credentials reach the agent
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/eve/v1/info"
        url_username: "{{ route_auth_credentials.username }}"
        url_password: "{{ route_auth_credentials.password }}"
        force_basic_auth: true
        headers:
          Host: "{{ domain if (domain | default('') | length > 0) else inventory_hostname }}"
          X-Forwarded-Proto: https
        status_code: [200]
      no_log: true

    - name: Wait for the web UI to answer on localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ web_port }}/"
        status_code: [200]
      register: web_up
      retries: 20
      delay: 3
      until: web_up.status == 200

    - name: Set the public deployment origin
      ansible.builtin.set_fact:
        public_origin: >-
          {{ 'https://' + domain
             if (domain | default('') | length > 0)
             else 'http://' + inventory_hostname }}

    - name: Verify the public Caddy health route
      ansible.builtin.uri:
        url: "{{ public_origin }}/eve/v1/health"
        status_code: [200]
      register: public_health
      retries: 20
      delay: 3
      until: public_health.status == 200

    - name: Verify the public Caddy UI route
      ansible.builtin.uri:
        url: "{{ public_origin }}/"
        status_code: [200]
      register: public_web
      retries: 20
      delay: 3
      until: public_web.status == 200

    - name: Verify the public Caddy agent route rejects anonymous access
      ansible.builtin.uri:
        url: "{{ public_origin }}/eve/v1/info"
        status_code: [401]
      register: public_auth_required
      retries: 20
      delay: 3
      until: public_auth_required.status == 401

    - name: Verify Basic auth through public HTTPS and Caddy
      when: domain | default('') | length > 0
      ansible.builtin.uri:
        url: "{{ public_origin }}/eve/v1/info"
        url_username: "{{ route_auth_credentials.username }}"
        url_password: "{{ route_auth_credentials.password }}"
        force_basic_auth: true
        status_code: [200]
      register: public_authenticated
      retries: 20
      delay: 3
      until: public_authenticated.status == 200
      no_log: true

    - name: Record the successfully deployed Eve version
      ansible.builtin.copy:
        dest: "{{ eve_state_dir }}/deployed-eve-version"
        content: "{{ target_eve_version.stdout | trim }}\n"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Agent: systemd 'steve' on 127.0.0.1:{{ app_port }} (eve start)."
          - "Web UI: systemd 'steve-web' on 127.0.0.1:{{ web_port }} (next start)."
          - >-
            {{ 'Public site: https://' + domain + '/'
               if (domain | default('') | length > 0)
               else 'Public site (pre-domain): http://' + inventory_hostname + '/' }}
          - >-
            {{ ('Monitoring: https://' + monitoring_domain + '/  (Beszel; create admin on first visit)')
               if (monitoring_enabled | default(false) and (monitoring_domain | default('') | length > 0))
               else 'Monitoring: disabled or not exposed' }}
          - >-
            {{ ('Traces: https://' + jaeger_domain + '/  (Jaeger; '
                + ('Basic auth user ' + jaeger_basic_auth_user
                   if (jaeger_basic_auth_hash | default('') | length > 0)
                   else 'disabled until JAEGER_BASIC_AUTH_HASH is set') + ')')
               if (jaeger_enabled | default(false) and (jaeger_domain | default('') | length > 0))
               else 'Traces: Jaeger disabled or not exposed' }}
          - "Deployment metadata: responses include 'x-hosted-on-vercel: false'."
