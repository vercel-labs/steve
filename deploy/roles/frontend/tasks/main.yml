---
# Build and run the Next.js UI (withEve + useEveAgent) as the public site.
# The repo is already cloned at {{ app_dir }} and dependencies installed by the
# `app` role, so this role only builds the web app and runs `next start`.
#
# Topology: Caddy sends /eve/* and /.well-known/workflow/* to the agent;
# everything else goes to this Next.js service.

# `next build` needs ~1.5GB; the 2GB droplet (Postgres + agent + Docker) has
# too little free RAM and no swap, so the build OOMs. Add a swapfile first
# (idempotent) to give the build headroom.
- name: Check whether swap is already active
  ansible.builtin.command: swapon --noheadings --show=NAME
  register: active_swaps
  changed_when: false
  become: true

- name: Set up the swapfile
  when: swapfile_path not in active_swaps.stdout
  become: true
  block:
    - name: Create a 2G swapfile if absent
      ansible.builtin.command:
        cmd: "fallocate -l 2G {{ swapfile_path }}"
        creates: "{{ swapfile_path }}"

    - name: Secure the swapfile
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        mode: "0600"

    - name: Format the swapfile
      ansible.builtin.command:
        cmd: "mkswap {{ swapfile_path }}"
      register: mkswap
      changed_when: "'Setting up swapspace' in mkswap.stdout"

    - name: Enable the swapfile
      ansible.builtin.command:
        cmd: "swapon {{ swapfile_path }}"
      changed_when: true

- name: Persist swap in fstab
  ansible.posix.mount:
    path: none
    src: "{{ swapfile_path }}"
    fstype: swap
    opts: sw
    state: present
  become: true

- name: Build the Next.js app
  ansible.builtin.command:
    cmd: pnpm run build:web
    chdir: "{{ app_dir }}"
  become: true
  become_user: "{{ app_user }}"
  environment: >-
    {{ pnpm_env | combine({'EVE_SELF_HOSTED': '1',
                           'NEXT_TELEMETRY_DISABLED': '1',
                           'NODE_OPTIONS': '--max-old-space-size=1536'}) }}
  register: web_build
  changed_when: true

- name: Install the steve-web systemd unit
  ansible.builtin.template:
    src: steve-web.service.j2
    dest: /etc/systemd/system/steve-web.service
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart steve-web

- name: Enable and start the steve-web service
  ansible.builtin.systemd:
    name: steve-web
    enabled: true
    state: started
    daemon_reload: true
  become: true

# `next start` serves one fixed build; every `next build` changes the asset
# hashes in the served HTML, so a running server keeps emitting HTML that
# references CSS/JS chunks the new .next no longer has -> 500s and broken styling.
# Always restart the server after a build so the served HTML matches disk.
# (A notify handler isn't enough: it only fires when the unit file changes.)
- name: Restart steve-web to serve the fresh build
  ansible.builtin.systemd:
    name: steve-web
    state: restarted
  become: true
  when: web_build is changed

- name: Wait for the web app to answer on localhost
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_port }}/"
    status_code: [200]
  register: web_health
  retries: 20
  delay: 3
  until: web_health.status == 200
