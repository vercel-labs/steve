---
# Create (idempotently) the droplet and capture its public IPv4, then render
# inventory.ini so subsequent playbooks can connect.

- name: Require a DigitalOcean API token
  ansible.builtin.assert:
    that:
      - do_api_token | default('') | length > 0
    fail_msg: >-
      No DigitalOcean API token. Set it with `export DO_API_TOKEN=dop_v1_...`
      before running, or pass `-e do_api_token=...`.

- name: Read local SSH public key
  ansible.builtin.set_fact:
    local_ssh_pubkey: "{{ lookup('file', local_ssh_pubkey_path | expanduser) }}"

- name: Ensure the SSH key is registered in DigitalOcean
  community.digitalocean.digital_ocean_sshkey:
    oauth_token: "{{ do_api_token }}"
    name: "{{ do_ssh_key_name }}"
    ssh_pub_key: "{{ local_ssh_pubkey }}"
    state: present

# Resolve the key's fingerprint directly from the API. The sshkey module only
# returns the key id when it CREATES the key (changed); on a subsequent run the
# key already exists and the registered data is empty, which would otherwise
# leave the droplet with no authorized key. The fingerprint lookup is reliable
# in both cases, and the droplet module accepts fingerprints for ssh_keys.
- name: Look up registered SSH keys
  ansible.builtin.uri:
    url: "https://api.digitalocean.com/v2/account/keys?per_page=200"
    headers:
      Authorization: "Bearer {{ do_api_token }}"
    return_content: true
  register: do_keys_resp

- name: Resolve our SSH key fingerprint
  ansible.builtin.set_fact:
    do_ssh_fingerprint: >-
      {{ (do_keys_resp.json.ssh_keys
          | selectattr('name', 'equalto', do_ssh_key_name)
          | map(attribute='fingerprint') | list | first) }}

- name: Fail if the SSH key fingerprint could not be resolved
  ansible.builtin.assert:
    that:
      - do_ssh_fingerprint is defined
      - do_ssh_fingerprint | length > 0
    fail_msg: "Could not find the '{{ do_ssh_key_name }}' SSH key in the DO account."

# NOTE: we create the droplet via the raw DO API rather than the
# community.digitalocean.digital_ocean_droplet module. In the installed module
# version the `ssh_keys` parameter is not reliably applied at creation, leaving
# root with no authorized key (publickey auth then fails). The direct API call
# honors ssh_keys, so the key we registered above is installed for root.
- name: Look up any existing droplet with this name
  ansible.builtin.uri:
    url: "https://api.digitalocean.com/v2/droplets?name={{ do_droplet_name }}"
    headers:
      Authorization: "Bearer {{ do_api_token }}"
    return_content: true
  register: existing_droplets

- name: Create the droplet (only if none exists with this name)
  ansible.builtin.uri:
    url: "https://api.digitalocean.com/v2/droplets"
    method: POST
    headers:
      Authorization: "Bearer {{ do_api_token }}"
    body_format: json
    body:
      name: "{{ do_droplet_name }}"
      region: "{{ do_region }}"
      size: "{{ do_size }}"
      image: "{{ do_image }}"
      ssh_keys:
        - "{{ do_ssh_fingerprint }}"
    status_code: [201, 202]
  register: created_droplet
  when: existing_droplets.json.droplets | length == 0

- name: Determine the droplet id
  ansible.builtin.set_fact:
    droplet_id: >-
      {{ created_droplet.json.droplet.id
         if (created_droplet is defined and created_droplet.json is defined)
         else existing_droplets.json.droplets[0].id }}

- name: Wait for the droplet to become active and get an IP
  ansible.builtin.uri:
    url: "https://api.digitalocean.com/v2/droplets/{{ droplet_id }}"
    headers:
      Authorization: "Bearer {{ do_api_token }}"
    return_content: true
  register: droplet_status
  retries: 60
  delay: 5
  until:
    - droplet_status.json.droplet.status == "active"
    - >-
      (droplet_status.json.droplet.networks.v4
       | selectattr('type', 'equalto', 'public') | list | length) > 0

- name: Resolve the droplet public IPv4
  ansible.builtin.set_fact:
    droplet_ip: >-
      {{ droplet_status.json.droplet.networks.v4
         | selectattr('type', 'equalto', 'public')
         | map(attribute='ip_address') | list | first }}

- name: Fail if no public IP was assigned
  ansible.builtin.assert:
    that:
      - droplet_ip is defined
      - droplet_ip | length > 0
    fail_msg: "Could not determine the droplet's public IP from the DO API response."

- name: Render inventory.ini with the droplet IP
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/inventory.ini"
    mode: "0644"
    content: |
      # Generated by provision.yml on {{ ansible_date_time.iso8601 | default('provision') }}.
      # Droplet: {{ do_droplet_name }} ({{ do_size }} @ {{ do_region }})
      [steve]
      {{ droplet_ip }}

      [steve:vars]
      ansible_ssh_private_key_file={{ local_ssh_pubkey_path | regex_replace('\.pub$', '') }}

- name: Wait for SSH to come up on the new droplet
  ansible.builtin.wait_for:
    host: "{{ droplet_ip }}"
    port: 22
    delay: 5
    timeout: 300
    state: started

- name: Report
  ansible.builtin.debug:
    msg:
      - "Droplet ready at {{ droplet_ip }}"
      - "Next: ansible-playbook bootstrap.yml"
      - "Point your domain's A record at {{ droplet_ip }} when ready, then set 'domain' in group_vars/all.yml."
