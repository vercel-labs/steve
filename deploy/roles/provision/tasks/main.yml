---
# Create (idempotently) the droplet and capture its public IPv4, then render
# inventory.ini so subsequent playbooks can connect.

- name: Require a DigitalOcean API token
  ansible.builtin.assert:
    that:
      - do_api_token | default('') | length > 0
    fail_msg: >-
      No DigitalOcean API token. Set it with `export DO_API_TOKEN=dop_v1_...`
      before running, or pass `-e do_api_token=...`.

- name: Read local SSH public key
  ansible.builtin.set_fact:
    local_ssh_pubkey: "{{ lookup('file', local_ssh_pubkey_path | expanduser) }}"

- name: Ensure the SSH key is registered in DigitalOcean
  community.digitalocean.digital_ocean_sshkey:
    oauth_token: "{{ do_api_token }}"
    name: "{{ do_ssh_key_name }}"
    ssh_pub_key: "{{ local_ssh_pubkey }}"
    state: present
  register: do_sshkey

- name: Create the droplet (idempotent by unique_name)
  community.digitalocean.digital_ocean_droplet:
    oauth_token: "{{ do_api_token }}"
    name: "{{ do_droplet_name }}"
    unique_name: true
    region: "{{ do_region }}"
    size: "{{ do_size }}"
    image: "{{ do_image }}"
    ssh_keys:
      - "{{ do_sshkey.data.ssh_key.id }}"
    state: present
    wait: true
    wait_timeout: 600
  register: droplet

- name: Resolve the droplet public IPv4
  ansible.builtin.set_fact:
    droplet_ip: >-
      {{ (droplet.data.droplet.networks.v4
          | selectattr('type', 'equalto', 'public')
          | map(attribute='ip_address') | list | first)
         if droplet.data is defined and droplet.data.droplet is defined
         else droplet.data.ip_address }}

- name: Fail if no public IP was assigned
  ansible.builtin.assert:
    that:
      - droplet_ip is defined
      - droplet_ip | length > 0
    fail_msg: "Could not determine the droplet's public IP from the DO API response."

- name: Render inventory.ini with the droplet IP
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/inventory.ini"
    mode: "0644"
    content: |
      # Generated by provision.yml on {{ ansible_date_time.iso8601 | default('provision') }}.
      # Droplet: {{ do_droplet_name }} ({{ do_size }} @ {{ do_region }})
      [steve]
      {{ droplet_ip }}

      [steve:vars]
      ansible_ssh_private_key_file={{ local_ssh_pubkey_path | regex_replace('\.pub$', '') }}

- name: Wait for SSH to come up on the new droplet
  ansible.builtin.wait_for:
    host: "{{ droplet_ip }}"
    port: 22
    delay: 5
    timeout: 300
    state: started

- name: Report
  ansible.builtin.debug:
    msg:
      - "Droplet ready at {{ droplet_ip }}"
      - "Next: ansible-playbook bootstrap.yml"
      - "Point your domain's A record at {{ droplet_ip }} when ready, then set 'domain' in group_vars/all.yml."
