collections:
  # DigitalOcean droplet provisioning (digital_ocean_droplet, etc.)
  - name: community.digitalocean
    version: ">=1.27.0"
  # General utilities (ufw is in community.general)
  - name: community.general
    version: ">=8.0.0"
  - name: ansible.posix
    version: ">=1.5.0"
  # SSH keypair generation for the GitHub deploy key (openssh_keypair)
  - name: community.crypto
    version: ">=2.10.0"
