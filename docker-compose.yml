# Self-hosted infrastructure for the eve PoC.
# No Vercel services: durability is Postgres; traces go to local Jaeger or
# Axiom; console logs go to Axiom via Vector.
services:
  postgres:
    image: postgres:16
    container_name: steve-postgres
    environment:
      POSTGRES_USER: world
      POSTGRES_PASSWORD: world
      POSTGRES_DB: world
    # Host port 5544 (not 5432) to avoid clashing with other local Postgres
    # instances. The container still listens on 5432 internally.
    ports:
      - "5544:5432"
    volumes:
      - steve-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U world -d world"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: portable OpenTelemetry trace backend (stretch goal).
  # Start with `docker compose --profile observability up -d`.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: steve-jaeger
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318"   # OTLP HTTP receiver

  # Optional: ship the eve host's console logs to Axiom.
  # Start with `docker compose --profile logs up -d` (or `make logs-up`).
  # Requires AXIOM_TOKEN (and optionally AXIOM_DATASET, AXIOM_DOMAIN) in .env.
  # Tails ./logs/host.log, which `make dev` writes to.
  vector:
    image: timberio/vector:0.49.0-debian
    container_name: steve-vector
    profiles: ["logs"]
    env_file:
      - .env
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - ./logs:/logs:ro
    command: ["--config", "/etc/vector/vector.toml"]

volumes:
  steve-pgdata:
